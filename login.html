<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Link - Iniciar Sesión</title>
    <link rel="icon" href="/imagenes/logoiot.ico" type="image/x-icon" sizes="192x192">
    <link rel="shortcut icon" href="/imagenes/logoiot.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="/imagenes/logoiot.png">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-box">
        <!-- Logo -->
        <div class="login-logo">
            <img src="/imagenes/logoiot.png" alt="IoTLink Logo">
        </div>

        <!-- Título -->
        <h1>Bienvenido a IoTLink</h1>
        <p class="login-subtitle">Ingresa tus credenciales para continuar</p>

        <!-- Formulario -->
        <form class="login-form">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="tu@email.com" 
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="••••••••" 
                    required
                >
            </div>

            <button type="submit" class="btn-login">Iniciar Sesión</button>
        </form>

        <!-- Footer -->
        <div class="login-footer">
            <p>¿No tienes cuenta? <a href="#" class="signup-link">Crear una nueva</a></p>
        </div>
    </div>
</body>
</html>
